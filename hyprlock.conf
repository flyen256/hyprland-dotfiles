$foreground = rgba(fbf1c7ff)
$border = rgba(d5c4a1ff)
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/b-293.jpg
    
    color = rgb(0,0,0)

    blur_size = 2
    blur_passes = 2
    noise = 0.0117
    contrast = 1.3000
		brightness = 0.6000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H"):$(date +"%M") </big></b>"
    color = $foreground
    font_size = 112
    font_family = FiraCode Nerd Font Bold
    shadow_passes = 0
    shadow_size = 0

    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = $foreground
    font_size = 18
    font_family = FiraCode Nerd Font

    position = 0, 135
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = $foreground
    font_size = 14
    font_family = FiraCode Nerd Font 10

    position = 0, 105
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "<b>Feels like<big> $(curl -s 'wttr.in/Нягань?format=%t') </big></b>"
    color = $foreground
    font_size = 14
    font_family = FiraCode Nerd Font

    position = 0, 40
    halign = center
    valign = bottom
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3

    dots_size = 0.26
		dots_spacing = 0.64
    dots_center = true
    dots_rouding = -1

    rounding = 15
    outer_color = $border
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = $foreground
    font_family = FiraCode Nerd Font Bold
    fade_on_empty = true
    placeholder_text = <i>Password...</i>

    position = 0, 120
    halign = center
    valign = bottom
}
